<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DUCO Dashboard</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

<h1>🪙 DUCO Dashboard</h1>

<div class="cards">

<div class="card">
<h2>💰 Guthaben</h2>
<p id="balance">Lädt...</p>
</div>

<div class="card">
<h2>📈 Kurs</h2>
<p id="price">Lädt...</p>
</div>

<div class="card">
<h2>🪙 Heute verdient</h2>
<p id="today">Lädt...</p>
</div>

<div class="card">
<h2>📊 Durchschnitt / 24h</h2>
<p id="average">Lädt...</p>
</div>

<div class="card">
<h2>⚡ Hashrate</h2>
<p id="hashrate">Lädt...</p>
</div>

<div class="card">
<h2>⛏️ Miner</h2>
<p id="miners">Lädt...</p>
</div>

</div>

<div class="chartCard">

<h2>📈 DUCO Kurs</h2>

<canvas id="priceChart"></canvas>

</div>

<p id="updated">Aktualisierung...</p>

</div>

<script src="script.js"></script>

</body>
</html>
